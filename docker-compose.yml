services:
  server:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      CHAT_USERNAME: ${CHAT_USERNAME:-admin}
      CHAT_PASSWORD: ${CHAT_PASSWORD:-changeme}
      JWT_SECRET:    ${JWT_SECRET:-jwt-secret-change-me}
      HOST_KEY:      ${HOST_KEY:-host-key-change-me}
      PORT:          "3000"
    volumes:
      - server-data:/data
    restart: unless-stopped

  anth-ui:
    build:
      context: ./ref-ui/web
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      RELAY_URL:  "http://server:3000"
      NODE_ENV:   production
    restart: unless-stopped

volumes:
  server-data:
