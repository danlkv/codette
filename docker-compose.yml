services:
  server:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      PORT: "3000"
      SERVER_HOSTNAME: ${SERVER_HOSTNAME}
      PUBLIC_URL: ${PUBLIC_URL:-https://${SERVER_HOSTNAME}}
      CODETTE_DATA_DIR: /data/codette
      GOOGLE_OIDC_CLIENT_ID: ${GOOGLE_OIDC_CLIENT_ID:-}
      GOOGLE_OIDC_CLIENT_SECRET: ${GOOGLE_OIDC_CLIENT_SECRET:-}
      # Point at the operator-owned deploy overlay (e.g. /app/oidc-providers.deploy.jsonc).
      # Unset in local dev → server falls back to the committed oidc-providers.jsonc.
      CODETTE_OIDC_PROVIDERS_FILE: ${CODETTE_OIDC_PROVIDERS_FILE:-}
    volumes:
      - server-data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    profiles: [tls]
    depends_on: [server]
    ports:
      - "80:80"
      - "443:443"
    environment:
      SERVER_HOSTNAME: ${SERVER_HOSTNAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  server-data:
  caddy-data:
  caddy-config:
