<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Layout 5: Flex + dvh + JS visual viewport</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460;
  --accent: #c471ed; --text: #e0e0e0; --dim: #888; --border: #2a2a4a;
  --app-h: 100dvh;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font: 14px/1.5 system-ui, sans-serif; }

/* ── KEY TECHNIQUE ──────────────────────────────────────────────────────────
   JS tracks window.visualViewport.height and sets --app-h CSS variable.
   This is the current webclaude approach. The layout height tracks the
   actual visible area precisely — shrinks with keyboard, updates on zoom.
   Problem: on pinch-zoom, visualViewport.height changes → layout reflows →
   message area visually shrinks as user zooms in to read text.
   ────────────────────────────────────────────────────────────────────────── */
body {
  display: flex;
  flex-direction: column;
  height: var(--app-h);  /* ← JS-tracked visual viewport height */
}
#app {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; flex-direction: column; gap: 2px;
  flex-shrink: 0;
}
header h1 { font-size: .9rem; color: var(--accent); font-weight: 600; }
header p  { font-size: .72rem; color: var(--dim); }
.messages {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.msg { max-width: 680px; width: 100%; }
.msg.hn { align-self: flex-start; }
.msg-label { font-size: .65rem; color: var(--dim); margin-bottom: 3px; }
.msg-body {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px; font-size: .85rem; line-height: 1.5;
}
.msg-body a { color: var(--accent); text-decoration: none; }
.msg-title { font-weight: 600; margin-bottom: 4px; }
.msg-meta { font-size: .72rem; color: var(--dim); margin-top: 4px; }
.loading { color: var(--dim); font-size: .85rem; text-align: center; padding: 40px; }
footer {
  flex-shrink: 0;
  background: var(--bg2); border-top: 1px solid var(--border);
  padding: 10px 16px; display: flex; gap: 8px; align-items: flex-end;
}
textarea {
  flex: 1; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font: inherit; font-size: .85rem;
  padding: 8px 10px; resize: none; min-height: 36px; max-height: 160px;
  overflow-y: auto; line-height: 1.4;
}
textarea:focus { outline: none; border-color: var(--accent); }
button {
  background: var(--accent); border: none; border-radius: 6px;
  color: #fff; font: inherit; font-size: .8rem; padding: 8px 14px;
  cursor: pointer; flex-shrink: 0; align-self: flex-end;
}
.vp-debug {
  position: fixed; top: 4px; right: 8px; font-size: .65rem;
  color: var(--dim); z-index: 100; pointer-events: none;
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Layout 5 — Flex + dvh + JS visualViewport</h1>
    <p>--app-h tracks visualViewport.height; flex column; min-height:0 on messages</p>
  </header>
  <div class="messages" id="msgs">
    <div class="loading">Loading HN top stories…</div>
  </div>
  <footer>
    <textarea rows="1" placeholder="Type a message…" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,160)+'px'"></textarea>
    <button>Send</button>
  </footer>
</div>
<div class="vp-debug" id="dbg"></div>
<script>
// JS visual viewport tracking
function setH() {
  const h = window.visualViewport?.height ?? window.innerHeight;
  document.documentElement.style.setProperty('--app-h', h + 'px');
  document.getElementById('dbg').textContent = `vp:${Math.round(h)}px scale:${(window.visualViewport?.scale??1).toFixed(2)}`;
}
setH();
window.visualViewport?.addEventListener('resize', setH);
window.addEventListener('resize', setH);

const container = document.getElementById('msgs');
async function load() {
  try {
    const ids = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json').then(r => r.json());
    container.innerHTML = '';
    for (const id of ids.slice(0, 25)) {
      const s = await fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r => r.json());
      if (!s || !s.title) continue;
      const el = document.createElement('div');
      el.className = 'msg hn';
      el.innerHTML = `
        <div class="msg-label">hacker news · ${new Date(s.time*1000).toLocaleTimeString()}</div>
        <div class="msg-body">
          <div class="msg-title"><a href="${s.url||'#'}" target="_blank">${s.title}</a></div>
          ${s.text ? `<div style="margin-top:6px;font-size:.8rem;color:var(--dim)">${s.text.replace(/<[^>]+>/g,'').slice(0,200)}…</div>` : ''}
          <div class="msg-meta">▲ ${s.score} · ${s.descendants||0} comments · by ${s.by}</div>
        </div>`;
      container.appendChild(el);
      container.scrollTop = container.scrollHeight;
    }
  } catch(e) {
    container.innerHTML = `<div class="loading">Failed: ${e.message}</div>`;
  }
}
load();
</script>
</body>
</html>
