<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>codette — error</title>
<style>
  :root {
    --bg-primary:   #0d0d0d;
    --bg-secondary: #111111;
    --bg-elevated:  #1c1c1c;
    --border:       #2a2a2a;
    --text:         #e0e0e0;
    --text-muted:   #888;
    --accent:       #cc5500;
    --accent-light: #e06020;
    --error:        #e06c75;
    --code-color:   #e8c97a;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg-primary:   #f5f5f5;
      --bg-secondary: #ffffff;
      --bg-elevated:  #e8e8e8;
      --border:       #d0d0d0;
      --text:         #1a1a1a;
      --text-muted:   #666;
      --error:        #c0392b;
      --code-color:   #8b6914;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    font-size: 14px;
    background: var(--bg-primary);
    color: var(--text);
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    width: 520px;
    max-width: 100%;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .brand { color: var(--accent); font-size: 1rem; font-weight: 600; text-align: center; letter-spacing: .05em; }
  .title { color: var(--error); font-size: .95rem; text-align: center; font-weight: 600; }
  .message { color: var(--text); font-size: .85rem; line-height: 1.55; text-align: center; }
  .hint {
    color: var(--text-muted);
    font-size: .82rem;
    line-height: 1.6;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  .hint kbd {
    display: inline-block;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font: inherit;
    font-size: .78rem;
    color: var(--code-color);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">codette</div>
    <p class="title">__TITLE__</p>
    <p class="message">__MESSAGE__</p>
    <div class="hint">__HINT__</div>
  </div>
</body>
</html>
