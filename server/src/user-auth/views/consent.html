<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>codette — register</title>
<style>
  :root {
    --bg-primary:   #0d0d0d;
    --bg-secondary: #111111;
    --bg-elevated:  #1c1c1c;
    --border:       #2a2a2a;
    --text:         #e0e0e0;
    --text-muted:   #888;
    --accent:       #cc5500;
    --accent-light: #e06020;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg-primary:   #f5f5f5;
      --bg-secondary: #ffffff;
      --bg-elevated:  #e8e8e8;
      --border:       #d0d0d0;
      --text:         #1a1a1a;
      --text-muted:   #666;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    font-size: 14px;
    background: var(--bg-primary);
    color: var(--text);
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    width: 520px;
    max-width: 100%;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .brand {
    color: var(--accent);
    font-size: 1rem;
    font-weight: 600;
    text-align: center;
    letter-spacing: .05em;
  }
  .lede {
    text-align: center;
    color: var(--text-muted);
    font-size: .82rem;
    line-height: 1.6;
  }
  .uname {
    color: var(--accent-light);
    background: var(--bg-elevated);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  form { display: flex; flex-direction: column; gap: 10px; margin: 0; }
  button {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
    text-align: center;
    transition: color .15s, border-color .15s;
    display: block;
  }
  button:hover { color: var(--accent-light); border-color: var(--accent-light); }

  /* Google-branded sign-in button per Google's Identity branding guidelines.
     Light mode: white bg, dark text. Dark mode: #131314 bg, white text. */
  .gsi {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    height: 40px;
    padding: 0 12px;
    border-radius: 4px;
    text-decoration: none;
    font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: .25px;
    background: #131314;
    color: #e3e3e3;
    border: 1px solid #8e918f;
    transition: background .15s, border-color .15s;
  }
  .gsi:hover { background: #1f1f20; border-color: #c4c7c5; }
  @media (prefers-color-scheme: light) {
    .gsi { background: #ffffff; color: #1f1f1f; border-color: #747775; }
    .gsi:hover { background: #f8faff; border-color: #4285f4; }
  }
  .gsi svg { width: 18px; height: 18px; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">codette</div>
    <p class="lede">Register host as <span class="uname">__USERNAME__</span></p>
    __GOOGLE_BLOCK__
    <form method="POST" action="/register/finish-trial">
      <input type="hidden" name="state" value="__STATE__">
      <input type="hidden" name="csrf" value="__CSRF__">
      <button type="submit">__TRIAL_LABEL__</button>
    </form>
  </div>
</body>
</html>
