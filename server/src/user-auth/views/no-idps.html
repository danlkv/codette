<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>codette — no IdPs configured</title>
<style>
  :root {
    --bg-primary:   #0d0d0d;
    --bg-secondary: #111111;
    --border:       #2a2a2a;
    --text:         #e0e0e0;
    --text-muted:   #888;
    --accent:       #cc5500;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg-primary:   #f5f5f5;
      --bg-secondary: #ffffff;
      --border:       #d0d0d0;
      --text:         #1a1a1a;
      --text-muted:   #666;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    font-size: 14px;
    background: var(--bg-primary);
    color: var(--text);
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    width: 520px; max-width: 100%;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .brand { color: var(--accent); font-size: 1rem; font-weight: 600; text-align: center; letter-spacing: .05em; }
  .title { font-size: .95rem; text-align: center; font-weight: 600; }
  .message { color: var(--text-muted); font-size: .82rem; line-height: 1.55; text-align: center; }
  kbd { background: var(--border); padding: 1px 6px; border-radius: 4px; font-family: inherit; font-size: .85em; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">codette</div>
    <p class="title">No identity providers configured</p>
    <p class="message">This server has no entries in <kbd>oidc-providers.jsonc</kbd>. Ask the operator to enable a sign-in method.</p>
  </div>
</body>
</html>
