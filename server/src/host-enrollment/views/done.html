<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="6;url=/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>codette — registered</title>
<style>
  :root {
    --bg-primary:   #0d0d0d;
    --bg-secondary: #111111;
    --bg-elevated:  #1c1c1c;
    --border:       #2a2a2a;
    --text:         #e0e0e0;
    --text-muted:   #888;
    --accent:       #cc5500;
    --accent-light: #e06020;
    --status-ok:    #4f4;
    --code-color:   #e8c97a;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg-primary:   #f5f5f5;
      --bg-secondary: #ffffff;
      --bg-elevated:  #e8e8e8;
      --border:       #d0d0d0;
      --text:         #1a1a1a;
      --text-muted:   #666;
      --status-ok:    #009500;
      --code-color:   #8b6914;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    font-size: 14px;
    background: var(--bg-primary);
    color: var(--text);
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    width: 520px;
    max-width: 100%;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .brand { color: var(--accent); font-size: 1rem; font-weight: 600; text-align: center; letter-spacing: .05em; }
  .ok { color: var(--status-ok); text-align: center; font-size: .95rem; }
  .uname {
    color: var(--code-color);
    background: var(--bg-elevated);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .hint { color: var(--text-muted); font-size: .82rem; line-height: 1.6; text-align: center; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">codette</div>
    <p class="ok">Registered as <span class="uname">__USERNAME__</span>.</p>
    <p class="hint">Redirecting to chat in <span id="cd">5</span> seconds… <a href="/">Go now</a>.</p>
  </div>
  <script>
    let n = 5;
    const el = document.getElementById('cd');
    const tick = setInterval(() => {
      n--;
      if (n <= 0) { clearInterval(tick); window.location = '/'; return; }
      el.textContent = n;
    }, 1000);
  </script>
</body>
</html>
